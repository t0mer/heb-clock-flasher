name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend lint & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev deps
        run: pip install ruff mypy types-PyYAML types-aiofiles pydantic pydantic-settings loguru prometheus-client

      - name: ruff lint
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy app

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install \
            fastapi==0.115.0 "uvicorn[standard]==0.30.6" httpx==0.27.2 \
            pydantic==2.9.2 pydantic-settings==2.5.2 loguru==0.7.2 \
            pyyaml==6.0.2 prometheus-client==0.21.0 aiofiles==24.1.0 \
            python-multipart==0.0.10 \
            pytest==8.3.3 pytest-asyncio==0.24.0

      - name: pytest
        run: pytest

  frontend-lint:
    name: Frontend lint & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript typecheck
        run: npm run typecheck

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python security tools
        run: pip install bandit pip-audit

      - name: Install frontend deps (for npm audit)
        working-directory: frontend
        run: npm ci

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: bandit
        working-directory: backend
        run: bandit -r app -ll

      - name: pip-audit
        working-directory: backend
        run: pip-audit --requirement <(pip install . --dry-run 2>/dev/null | grep "^Would install" | sed 's/Would install //' | tr ' ' '\n' | sed 's/-\([0-9]\)/==\1/') || true

      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: actionlint
        uses: rhysd/actionlint@v1

  docker-build:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-lint, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: techblog/esp-web-flasher:ci
