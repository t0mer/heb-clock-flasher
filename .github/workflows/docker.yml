name: "Docker Build"

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

jobs:
  docker:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get version from tag or SHA
        id: getSemver
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "$(echo ${GITHUB_SHA} | cut -c1-7)")
          echo "VERSION=${VERSION}"
          echo "semver=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.getSemver.outputs.semver }}
          tags: |
            techblog/heb-clock-flasher:latest
            techblog/heb-clock-flasher:${{ steps.getSemver.outputs.semver }}
